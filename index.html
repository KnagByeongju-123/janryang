<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잔량 혼입 방지 시스템 (QR코드)</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* 스타일: 모바일 터치 최적화 */
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; text-align: center; user-select: none; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; background: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 20px; color: #333; font-size: 1.5rem; }
    
    .screen { display: none; animation: fadeIn 0.3s; }
    .active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 버튼들 */
    .btn-worker { width: 100%; padding: 18px 8px; margin: 5px 0; font-size: 1.05rem; cursor: pointer; background: #4a90e2; color: white; border: none; border-radius: 8px; transition: background 0.2s; }
    .btn-worker:active { background: #357abd; transform: scale(0.98); }
    
    #worker-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* 작업 선택 버튼 */
    .btn-action { width: 100%; padding: 25px; margin: 10px 0; font-size: 1.2rem; cursor: pointer; background: #4a90e2; color: white; border: none; border-radius: 8px; transition: background 0.2s; font-weight: bold; }
    .btn-action:active { background: #357abd; transform: scale(0.98); }
    
    .btn-action.upload { background: #17a2b8; }
    .btn-action.upload:active { background: #138496; }
    
    .btn-action.use { background: #6f42c1; }
    .btn-action.use:active { background: #5a32a3; }

    /* QR 모달 오버레이 */
    #qr-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #qr-modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      position: relative;
      max-width: 450px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #preview-container {
      width: 100%;
      height: 300px;
      border: 3px solid #4a90e2;
      border-radius: 8px;
      background: #000;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .qr-modal-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }

    #closeQrModal {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      cursor: pointer;
      font-size: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 1001;
    }

    #closeQrModal:active {
      transform: scale(0.95);
    }

    /* QR 인식 결과 박스 */
    .qr-result-display {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
      order: -1;
    }

    .qr-result-display.show {
      display: block;
    }

    .qr-result-display h3 {
      margin: 0 0 10px 0;
      color: #2e7d32;
      font-size: 1.1rem;
    }

    .qr-result-value {
      font-size: 1.2rem;
      font-weight: bold;
      color: #1565c0;
      word-break: break-all;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .qr-modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-qr-use, .btn-qr-retry {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-qr-use {
      background: #4caf50;
      color: white;
    }

    .btn-qr-use:active {
      background: #3d8b40;
      transform: scale(0.98);
    }

    .btn-qr-retry {
      background: #ff9800;
      color: white;
    }

    .btn-qr-retry:active {
      background: #e68900;
      transform: scale(0.98);
    }

    /* 키패드 */
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .key-btn { padding: 20px; font-size: 1.5rem; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; cursor: pointer; }
    .key-btn:active { background: #e2e6ea; }
    .key-confirm { grid-column: span 3; background: #28a745; color: white; font-weight: bold; }
    
    /* 수량 입력창 */
    input[type="text"] { width: 90%; padding: 15px; font-size: 1.5rem; text-align: center; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; background: #fafafa; }
    input:focus { border-color: #4a90e2; outline: none; background: #fff; }

    /* 결과창 */
    .result-box { font-size: 5rem; font-weight: bold; margin: 40px 0; }
    .res-ok { color: #28a745; }
    .res-ng { color: #dc3545; }
    
    /* 상세 정보 박스 */
    .info-box { background: #f1f3f5; padding: 20px; border-radius: 10px; text-align: left; margin-bottom: 20px; font-size: 1.1rem; line-height: 1.6; }
    .info-box span { font-weight: bold; color: #333; float: right; }

    .btn-finish { width: 100%; padding: 20px; font-size: 1.3rem; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .btn-finish:active { background: #5a6268; transform: scale(0.98); }
    
    /* 로딩 오버레이 */
    #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); color:white; font-size:2rem; padding-top:50%; z-index:999; }
  </style>
</head>
<body>

<div class="container">

  <!-- 1단계: 작업자 선택 -->
  <div id="step-1" class="screen active">
    <h1 style="color: #dc3545; font-size: 2rem; margin-bottom: 30px;">잔량관리 체크시트</h1>
    <h2>작업자 선택</h2>
    <div id="worker-list">
      <button class="btn-worker" onclick="selectWorker('오윤정')">오윤정</button>
      <button class="btn-worker" onclick="selectWorker('김미선')">김미선</button>
      <button class="btn-worker" onclick="selectWorker('권혜영')">권혜영</button>
      <button class="btn-worker" onclick="selectWorker('전순진')">전순진</button>
      <button class="btn-worker" onclick="selectWorker('하정화')">하정화</button>
      <button class="btn-worker" onclick="selectWorker('송경옥')">송경옥</button>
      <button class="btn-worker" onclick="selectWorker('이유선')">이유선</button>
      <button class="btn-worker" onclick="selectWorker('강란희')">강란희</button>
    </div>
  </div>

  <!-- 2단계: 작업 유형 선택 -->
  <div id="step-2" class="screen">
    <h2>작업 유형 선택</h2>
    <p style="color: #666; margin-bottom: 20px;">수행할 작업을 선택하세요</p>
    <button class="btn-action upload" onclick="selectActionType('보관')">📥 잔량박스에 보관</button>
    <button class="btn-action use" onclick="selectActionType('사용')">📤 잔량품 사용</button>
    <button class="btn-finish" onclick="goBackToStep1()" style="background: #dc3545; margin-top: 20px;">취소</button>
  </div>

  <!-- 3단계: Start QR 스캔 -->
  <div id="step-3" class="screen">
    <h2 id="step3-title">시작 QR 스캔</h2>
    <p style="color: #666; margin-bottom: 15px;">시작 QR코드를 스캔하세요</p>
    <button class="btn-finish" onclick="openQrScannerStart()" style="background: #4a90e2;">📱 QR 스캔 시작</button>
    <button class="btn-finish" onclick="goBackToStep2()" style="background: #dc3545; margin-top: 10px;">취소</button>
  </div>

  <!-- 4단계: 수량 입력 -->
  <div id="step-4" class="screen">
    <h2>수량 등록</h2>
    <input type="text" id="input-qty" readonly placeholder="0">
    <div class="keypad">
      <button class="key-btn" onclick="addQty(1)">1</button>
      <button class="key-btn" onclick="addQty(2)">2</button>
      <button class="key-btn" onclick="addQty(3)">3</button>
      <button class="key-btn" onclick="addQty(4)">4</button>
      <button class="key-btn" onclick="addQty(5)">5</button>
      <button class="key-btn" onclick="addQty(6)">6</button>
      <button class="key-btn" onclick="addQty(7)">7</button>
      <button class="key-btn" onclick="addQty(8)">8</button>
      <button class="key-btn" onclick="addQty(9)">9</button>
      <button class="key-btn" onclick="clearQty()">C</button>
      <button class="key-btn" onclick="addQty(0)">0</button>
      <button class="key-btn key-confirm" onclick="confirmQty()">입력 완료</button>
    </div>
  </div>

  <!-- 5단계: End QR 스캔 -->
  <div id="step-5" class="screen">
    <h2 id="step5-title">종료 QR 스캔</h2>
    <p style="color: #666; margin-bottom: 15px;">종료 QR코드를 스캔하세요</p>
    <button class="btn-finish" onclick="openQrScannerEnd()" style="background: #4a90e2;">📱 QR 스캔 시작</button>
    <button class="btn-finish" onclick="goBackToStep4()" style="background: #dc3545; margin-top: 10px;">취소</button>
  </div>

  <!-- 6단계: 판정 결과 -->
  <div id="step-6" class="screen">
    <h2>판정 결과</h2>
    <div id="result-display" class="result-box"></div>
    
    <div class="info-box">
      <div>작업자 <span id="disp-worker"></span></div>
      <div>작업 유형 <span id="disp-action"></span></div>
      <div>시작 QR <span id="disp-start"></span></div>
      <div>종료 QR <span id="disp-end"></span></div>
      <div>수량 <span id="disp-qty"></span></div>
    </div>

    <button id="btn-finish" class="btn-finish" onclick="saveData()">완료 (서버 저장)</button>
  </div>

</div>

<!-- QR 스캔 모달 -->
<div id="qr-modal">
  <div id="qr-modal-content">
    <button id="closeQrModal" onclick="closeQrModal()">&times;</button>
    <div id="preview-container"></div>
    
    <div class="qr-result-display" id="qr-result-display">
      <h3>✓ QR코드 인식됨</h3>
      <div class="qr-result-value" id="qr-result-text"></div>
      <div class="qr-modal-buttons">
        <button class="btn-qr-use" onclick="useQrValue()">이 값 사용</button>
        <button class="btn-qr-retry" onclick="retryQrScan()">다시 스캔</button>
      </div>
    </div>
  </div>
</div>

<div id="loading">저장 중...</div>

<script>
  // -----------------------------------------------------------
  // [설정] 아래 URL을 Google Apps Script 웹 앱 URL로 교체하세요
  // -----------------------------------------------------------
  const GOOGLE_SCRIPT_URL = "hhttps://script.google.com/macros/s/AKfycbxerfcHNMqkxcjaQLn2Nh0txl7IStqFhxnV6_fgxcJ_K_5-I657Q-LI8I31tyrtFHF9/exec";

  let appData = { worker: '', actionType: '', codeStart: '', qty: '', codeEnd: '', result: '' };
  let html5QrCodeScanner = null;
  let currentScanTarget = null; // 'START' 또는 'END'
  let lastQrCode = null;

  // 화면 전환
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ============================================
  // 1. 작업자 선택
  // ============================================
  function selectWorker(name) {
    appData.worker = name;
    showScreen('step-2');
  }

  function goBackToStep1() {
    showScreen('step-1');
  }

  // ============================================
  // 2. 작업 유형 선택
  // ============================================
  function selectActionType(type) {
    appData.actionType = type;
    const title = type === '보관' ? '[보관] 시작 QR 스캔' : '[사용] 시작 QR 스캔';
    document.getElementById('step3-title').innerText = title;
    showScreen('step-3');
  }

  function goBackToStep2() {
    showScreen('step-2');
  }

  // ============================================
  // 3. Start QR 스캔
  // ============================================
  function openQrScannerStart() {
    currentScanTarget = 'START';
    lastQrCode = null;
    document.getElementById('qr-result-display').classList.remove('show');
    document.getElementById('qr-result-text').innerText = '';
    openQrModal();
  }

  // ============================================
  // 4. 수량 입력 (키패드)
  // ============================================
  function addQty(n) { 
    document.getElementById('input-qty').value += n; 
  }
  function clearQty() { 
    document.getElementById('input-qty').value = ''; 
  }
  function confirmQty() {
    const val = document.getElementById('input-qty').value;
    if(!val) {
      alert("수량을 입력하세요");
      return;
    }
    appData.qty = val;
    
    const title = appData.actionType === '보관' ? '[보관] 종료 QR 스캔' : '[사용] 종료 QR 스캔';
    document.getElementById('step5-title').innerText = title;
    showScreen('step-5');
  }

  function goBackToStep4() {
    showScreen('step-4');
  }

  // ============================================
  // 5. End QR 스캔
  // ============================================
  function openQrScannerEnd() {
    currentScanTarget = 'END';
    lastQrCode = null;
    document.getElementById('qr-result-display').classList.remove('show');
    document.getElementById('qr-result-text').innerText = '';
    openQrModal();
  }

  // ============================================
  // QR 모달 제어
  // ============================================
  function openQrModal() {
    document.getElementById('qr-modal').style.display = 'flex';
    startQrScanner();
  }

  function closeQrModal() {
    stopQrScanner();
    document.getElementById('qr-modal').style.display = 'none';
  }

  // ============================================
  // QR 스캔 시작/종료
  // ============================================
  function startQrScanner() {
    const previewId = 'preview-container';
    
    try {
      html5QrCodeScanner = new Html5Qrcode(previewId);
      html5QrCodeScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 300, height: 300 } },
        (decodedText) => {
          // QR 코드가 감지되면 결과 표시
          if (decodedText && decodedText !== lastQrCode) {
            lastQrCode = decodedText;
            document.getElementById('qr-result-text').innerText = decodedText;
            document.getElementById('qr-result-display').classList.add('show');
            html5QrCodeScanner.pause(); // 스캔 일시 중지
          }
        },
        (errorMessage) => {
          // 무시 - 계속 스캔
        }
      ).catch(err => {
        alert("카메라 접근 오류: " + err);
        console.error(err);
        closeQrModal();
      });
    } catch (err) {
      alert("QR 스캐너 초기화 실패: " + err);
      console.error(err);
      closeQrModal();
    }
  }

  function stopQrScanner() {
    if (html5QrCodeScanner) {
      html5QrCodeScanner.stop()
        .then(() => {
          html5QrCodeScanner.clear();
          html5QrCodeScanner = null;
        })
        .catch(err => console.error("스캔 중지 오류:", err));
    }
  }

  function useQrValue() {
    const qrValue = document.getElementById('qr-result-text').innerText;
    
    if (currentScanTarget === 'START') {
      appData.codeStart = qrValue;
      closeQrModal();
      showScreen('step-4');
    } else if (currentScanTarget === 'END') {
      appData.codeEnd = qrValue;
      closeQrModal();
      compareAndShow();
    }
  }

  function retryQrScan() {
    document.getElementById('qr-result-display').classList.remove('show');
    document.getElementById('qr-result-text').innerText = '';
    lastQrCode = null;
    if (html5QrCodeScanner) {
      html5QrCodeScanner.resume();
    }
  }

  // ============================================
  // 6. 판정 결과
  // ============================================
  function compareAndShow() {
    // 문자열 단순 비교
    if(appData.codeStart === appData.codeEnd) {
      appData.result = "OK";
      document.getElementById('result-display').innerHTML = '<span class="res-ok">OK</span>';
      // OK: 진동 2회 (200ms 진동, 500ms 쉬기, 200ms 진동)
      if (navigator.vibrate) {
        navigator.vibrate([200, 500, 200]);
      }
    } else {
      appData.result = "NG";
      document.getElementById('result-display').innerHTML = '<span class="res-ng">NG</span>';
      // NG: 진동 5회 (100ms 진동, 500ms 쉬기 반복)
      if (navigator.vibrate) {
        navigator.vibrate([100, 500, 100, 500, 100, 500, 100, 500, 100]);
      }
    }
    
    // 정보 표시
    document.getElementById('disp-worker').innerText = appData.worker;
    document.getElementById('disp-action').innerText = appData.actionType;
    document.getElementById('disp-start').innerText = appData.codeStart;
    document.getElementById('disp-end').innerText = appData.codeEnd;
    document.getElementById('disp-qty').innerText = appData.qty;
    
    showScreen('step-6');
  }

  // ============================================
  // 7. 서버 저장
  // ============================================
  function saveData() {
    const btn = document.getElementById('btn-finish');
    const loading = document.getElementById('loading');
    
    if(btn.disabled) return;
    btn.disabled = true;
    loading.style.display = 'block';

    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(appData)
    })
    .then(response => {
      if (!response.ok) {
        throw new Error('서버 응답 오류: ' + response.status);
      }
      return response.text();
    })
    .then(result => {
      alert("저장 완료!");
      location.reload();
    })
    .catch(error => {
      console.error('Error:', error);
      alert("저장 중 오류가 발생했습니다.\n인터넷 연결을 확인해주세요.");
      btn.disabled = false;
      loading.style.display = 'none';
    });
  }

  // 모달 바깥 영역 클릭 시 닫기
  document.getElementById('qr-modal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeQrModal();
    }
  });
</script>

</body>

</html>
